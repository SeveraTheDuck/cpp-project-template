name: CI Pipeline

on:
  push:
    branches:
      - "**"
  
  pull_request:
    branches:
      - "main"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Code Quality (pre-commit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Setup Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Run pre-commit hooks
        run: nix develop --command pre-commit run --all-files

  build-and-test:
    name: Build & Test
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Setup Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Setup ccache caching
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-linux-${{ github.sha }}
          restore-keys: |
            ccache-linux-

      - name: Configure ccache environment
        run: |
          echo "CCACHE_DIR=$PWD/.ccache" >> $GITHUB_ENV
          echo "CCACHE_COMPRESS=1" >> $GITHUB_ENV
          echo "CCACHE_MAXSIZE=500M" >> $GITHUB_ENV

      - name: Build & Test (Dev Preset)
        run: |
          nix develop --command bash -c "
            cmake --preset dev
            cmake --build --preset dev
            ctest --test-dir build/dev --output-on-failure -j$(nproc)
          "

      - name: Build & Test (ASan + UBSan Preset)
        run: |
          nix develop --command bash -c "
            cmake --preset asan
            cmake --build --preset asan
            ctest --test-dir build/asan --output-on-failure -j$(nproc)
          "

      - name: Build (Release + LTO Preset)
        run: |
          nix develop --command bash -c "
            cmake --preset release
            cmake --build --preset release
          "
