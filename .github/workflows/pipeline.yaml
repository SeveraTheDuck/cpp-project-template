name: CI Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          flakehub: false

      - name: Setup Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-flakehub: false

      - name: Generate Compilation Database
        run: nix develop --command cmake --preset dev

      - name: Run pre-commit hooks
        run: nix develop --command pre-commit run --all-files

  build-and-test:
    name: Build (${{ matrix.compiler }}, ${{ matrix.preset }})
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [clang, gcc]
        preset: [dev, asan, release]

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          flakehub: false

      - name: Setup Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-flakehub: false

      - name: Setup ccache caching
        uses: actions/cache@v5
        with:
          path: .ccache
          key: ccache-${{ matrix.compiler }}-${{ matrix.preset }}-${{ github.sha }}
          restore-keys: ccache-${{ matrix.compiler }}-${{ matrix.preset }}-

      - name: Configure CMake (${{ matrix.preset }})
        env:
          CC: ${{ matrix.compiler == 'clang' && 'clang' || 'gcc' }}
          CXX: ${{ matrix.compiler == 'clang' && 'clang++' || 'g++' }}
        run: |
          nix develop --command cmake --preset ${{ matrix.preset }} -DCMAKE_CXX_CLANG_TIDY=OFF -DCMAKE_CXX_SCAN_FOR_MODULES=OFF

      - name: Build (${{ matrix.preset }})
        env:
          CC: ${{ matrix.compiler == 'clang' && 'clang' || 'gcc' }}
          CXX: ${{ matrix.compiler == 'clang' && 'clang++' || 'g++' }}
          CCACHE_DIR: ${{ github.workspace }}/.ccache
          CCACHE_MAXSIZE: 500M
        run: |
          nix develop --command cmake --build --preset ${{ matrix.preset }} -j$(nproc)

      - name: Run Tests (${{ matrix.preset }})
        run: |
          nix develop --command ctest --test-dir build/${{ matrix.preset }} --output-on-failure -j$(nproc)


  docs:
    name: Build & Deploy Docs
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          flakehub: false

      - name: Setup Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Generate Documentation
        run: nix develop --command doxygen Doxyfile

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs_output/html
