name: CI Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          flakehub: false

      - name: Setup Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-flakehub: false

      - name: Generate Compilation Database
        run: nix develop --command cmake --preset dev

      - name: Run pre-commit hooks
        run: nix develop --command pre-commit run --all-files

  build-and-test:
    name: Build (${{ matrix.compiler }})
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [clang, gcc]

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          flakehub: false

      - name: Setup Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-flakehub: false

      - name: Setup ccache caching
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-${{ matrix.compiler }}-${{ github.sha }}
          restore-keys: ccache-${{ matrix.compiler }}-

      - name: Build & Test All Presets
        run: |
          nix develop --command bash -c "
            # Выбор компилятора
            if [ '${{ matrix.compiler }}' = 'clang' ]; then
              export CC=clang; export CXX=clang++
            else
              export CC=gcc; export CXX=g++
            fi

            export CCACHE_DIR=$PWD/.ccache
            export CCACHE_MAXSIZE=500M

            echo '--- Building: Dev ---'
            cmake --preset dev && cmake --build --preset dev
            ctest --test-dir build/dev --output-on-failure -j$(nproc)

            echo '--- Building: ASan + UBSan ---'
            cmake --preset asan && cmake --build --preset asan
            ctest --test-dir build/asan --output-on-failure -j$(nproc)

            echo '--- Building: Release + LTO ---'
            cmake --preset release && cmake --build --preset release
          "
